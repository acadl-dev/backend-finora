# version: '3.8'
services:
  postgres:
    image: postgres:13
    container_name: postgres_finora
    restart: always
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=finora
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: